name = "frameshot-api"
main = "src/index.ts"
compatibility_date = "2023-12-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
workers_dev = false
route = { pattern = "api.frameshot.dev/*", zone_name = "frameshot.dev" }

# KV namespace for API keys
[[kv_namespaces]]
binding = "FRAMESHOT_KEYS"
id = "062de15ae7a74683b7513a5777dd8e3c"

# R2 bucket for thumbnails
[[r2_buckets]]
binding = "THUMBNAILS"
bucket_name = "frameshot-thumbnails"

# Service binding to container worker
[[services]]
binding = "CONTAINER"
service = "frameshot-processor"

# Environment variables
[vars]
MAX_FREE_REQUESTS = "50"
MAX_PRO_REQUESTS = "5000"
MAX_SCALE_REQUESTS = "50000"