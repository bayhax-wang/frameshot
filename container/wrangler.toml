name = "frameshot-processor"
main = "src/worker.js"
compatibility_date = "2024-04-17"
compatibility_flags = ["nodejs_compat"]

# Container configuration
[[containers]]
class_name = "FrameshotContainer"
image = "./Dockerfile"
max_instances = 5

# Durable Object binding for Container
[[durable_objects.bindings]]
class_name = "FrameshotContainer"
name = "FRAMESHOT_CONTAINER"

# R2 bucket binding
[[r2_buckets]]
binding = "THUMBNAILS"
bucket_name = "frameshot-thumbnails"

# KV namespace for API keys (auth)
[[kv_namespaces]]
binding = "FRAMESHOT_KEYS"
id = "062de15ae7a74683b7513a5777dd8e3c"

# Migrations
[[migrations]]
new_sqlite_classes = ["FrameshotContainer"]
tag = "v1"

# Cron: keepalive every 5 min + R2 cleanup every hour
[triggers]
crons = ["*/5 * * * *", "0 * * * *"]

[env.production]
workers_dev = false