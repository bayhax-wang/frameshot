name = "frameshot-processor"
main = "src/worker.js"
compatibility_date = "2024-04-17"
compatibility_flags = ["nodejs_compat"]

# Container configuration
[[containers]]
class_name = "FrameshotContainer"
image = "./Dockerfile"
max_instances = 5

# Durable Object binding for Container
[[durable_objects.bindings]]
class_name = "FrameshotContainer"
name = "FRAMESHOT_CONTAINER"

# R2 bucket binding
[[r2_buckets]]
binding = "THUMBNAILS"
bucket_name = "frameshot-thumbnails"

# Migrations
[[migrations]]
new_sqlite_classes = ["FrameshotContainer"]
tag = "v1"

[env.production]
workers_dev = false